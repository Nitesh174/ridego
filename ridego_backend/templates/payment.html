<!DOCTYPE html>
<html>

<head>
    <title>RideGo Payment</title>
</head>

<body>

    <h2>💳 Ride Payment</h2>

    <button onclick="payNow()">Pay Now ₹500</button>

    <!-- Razorpay Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>
        async function payNow() {

            // 🔥 Step 1: Create Order from backend
            let res = await fetch("https://ridego-1.onrender.com/create-order/", {
                method: "POST"
            });

            let order = await res.json();

            var options = {
                "key": "rzp_test_xxxxx", // 🔴 apna key daalo
                "amount": order.amount,
                "currency": "INR",
                "order_id": order.id,
                "name": "RideGo",
                "description": "Ride Payment",

                "handler": function (response) {

                    // 🔥 Step 2: Verify payment
                    fetch("https://ridego-1.onrender.com/payment-success/", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    })
                        .then(res => res.json())
                        .then(data => {
                            alert(data.status);

                            // ✅ redirect only here
                            window.location.href = "/success/";
                        });

                },

                "prefill": {
                    "name": "RideGo User"
                },

                "theme": {
                    "color": "#3399cc"
                }
            };

            var rzp = new Razorpay(options);
            rzp.open();
        }
    </script>

</body>

</html>
